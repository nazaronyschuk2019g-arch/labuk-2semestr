<h1>{{ product.name }}</h1>
<p>Категорія: {{ product.category.name }}</p>

{% if product.image %}
    <img src="{{ product.image.url }}" alt="{{ product.name }}" style="max-width: 300px;">
{% endif %}

<p>{{ product.description }}</p>
<h2>Ціна: {{ product.price }} грн</h2>

<button disabled style="padding: 10px 20px; background-color: grey; color: white;">Купити</button>

<br><br>
<a href="/">Повернутися до списку</a>
